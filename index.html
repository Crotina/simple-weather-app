<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXAMPLE weather app</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <!-- <a href="#"></a> -->
                 <img src="icons/icon.png" alt="">
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#" class="nav-link active">Melokii Weather App</a>
                </li>
                <li class="nav-item location_list_container">
                    <p class="nav-link">Current Location</p>
                    <ul id="location_list">
                        <li class="location_list_item">
                            <span class="DISPLAY_current_cityname">--</span>
                            <span class="DISPYAY_temperature">--</span>
                        </li>
                    </ul>
                </li>
                <li class="nav-item location_list_container">
                    <p class="nav-link">Saved City</p>
                    <ul id="location_list"></ul>
                </li>
                <!-- <li class="nav-item">
                    <a href="temp.html" class="nav-link"></a>
                </li> -->
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>
    <article id="main">
        <!-- basic info like city name or current temperature -->
        <section>
            <span>
                <h1 class="DISPLAY_current_cityname" id="main_cityname">display_location</h1>
                <p id="display_position">display_position</p>
            </span>
            <span>
                <h1 id="main_temperature" class="DISPYAY_temperature">--</h1>
            </span>
        </section>
        <!-- wind -->
        <section id="wind_info">
            <div class="wind_info_parts">
                <span>Visibility</span>
                <span class="DISPLAY_visibility">-</span>
            </div>
            <div class="wind_info_parts">
                <span>Wind Direction</span>
                <span class="DISPLAY_wind_direction">-</span>
            </div>
            <div class="wind_info_parts">
                <span>Wind Speed</span>
                <span class="DISPLAY_wind_speed">-</span>
            </div>
        </section>
        <section id="sunlight">
            <h2>Sunlight</h2>
            <div class="sunlight_content">
                <div class="sunlight_content_transit">
                    <span>transit</span>
                    <span id="display_transit">-:-:-</span>
                </div>
                <div class="tab">
                    <button class="tablink" data-tab="tab1">sunrise / sunset</button>
                    <button class="tablink" data-tab="tab2">Civil Twilight</button>
                    <button class="tablink" data-tab="tab3">Nautical Twilight</button>
                    <button class="tablink" data-tab="tab4">Astronomical Twilight</button>

                    <div id="tab1" class="tabcontent normal_sunlight">-</div>
                    <div id="tab2" class="tabcontent civil_twilight">-</div>
                    <div id="tab3" class="tabcontent nautical_twilight">-</div>
                    <div id="tab4" class="tabcontent astronomical_twilight">-</div>
                </div>
            </div>
        </section>
        <section id="hourly_forecast">
            <h2>Hourly Forcast</h2>
            <div id="hourly_forecast_list"></div>
        </section>
    </article>

    <script type="module" src="main.js"></script>
    <script src="content_layout.js"></script>
</body>
</html>
